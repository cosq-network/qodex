name = "npm"
description = "Run npm commands for package and script management."
version = "0.1.0"

triggers = [
  "npm",
  "package.json",
  "install",
  "npm run",
  "npm test",
  "npm build",
  "node_modules"
]

allowed_tools = [
  "npm_command",
  "read_file",
  "search_text",
  "list_files",
  "run_command",
  "review_changes"
]

context_budget_tokens = 4000
