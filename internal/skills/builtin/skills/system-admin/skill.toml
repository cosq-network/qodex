name = "system-admin"
description = "System administration tasks: grep, find, tail, awk, ps, chmod, chown, user management."
version = "0.1.0"

triggers = [
  "system",
  "admin",
  "grep",
  "find",
  "tail",
  "awk",
  "ps",
  "process",
  "chmod",
  "chown",
  "permission",
  "user",
  "useradd",
  "userdel"
]

allowed_tools = [
  "grep_search",
  "find_files",
  "tail_file",
  "awk_process",
  "ps_list",
  "chmod_change",
  "chown_change",
  "user_add",
  "user_del",
  "read_file",
  "search_text",
  "list_files",
  "run_command",
  "review_changes"
]

context_budget_tokens = 4000
