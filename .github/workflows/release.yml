name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Validate signing configuration
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" || -z "${GPG_FINGERPRINT}" ]]; then
            echo "GPG_PRIVATE_KEY and GPG_FINGERPRINT must be configured for public signed releases."
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ""
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}

      - name: Export public signing key
        run: gpg --armor --export "${GPG_FINGERPRINT}" > gpg-public-key.asc
        env:
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}

      - name: Upload public signing key
        uses: softprops/action-gh-release@v2
        with:
          files: gpg-public-key.asc
