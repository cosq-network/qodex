name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate release automation token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -z "${RELEASE_PLEASE_TOKEN}" ]]; then
            echo "RELEASE_PLEASE_TOKEN must be configured so Release Please can create tags that trigger the release workflow."
            exit 1
          fi

      - name: Validate release automation token guidance
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^.github/workflows/'; then
            echo "This push modifies GitHub Actions workflow files."
            echo "RELEASE_PLEASE_TOKEN must have permission to create refs for commits that touch workflows."
            echo "Fine-grained PAT: Contents=Read and write, Pull requests=Read and write, Workflows=Read and write, Metadata=Read."
            echo "Classic PAT: repo + workflow scopes."
          fi

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
