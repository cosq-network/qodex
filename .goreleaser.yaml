version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/qodex
    binary: qodex
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

signs:
  - artifacts: all
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]
    signature: "${artifact}.sig"
brews:
  - repository:
      owner: cosq-network
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@cosq.network
    commit_msg_template: "brew: bump {{ .ProjectName }} to {{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "README"
      - "^release:"
