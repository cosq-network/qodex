version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/qodex
    binary: qodex
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

nfpms:
  - id: packages
    package_name: qodex
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    homepage: https://github.com/benoybose/qodex
    description: Local-first coding agent CLI for OpenAI-compatible backends.
    maintainer: Benoy Bose
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

signs:
  - artifacts: all
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]
    signature: "${artifact}.sig"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "README"
      - "^release:"
